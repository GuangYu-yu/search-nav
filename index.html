<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>搜索导航</title>
    <link rel="preconnect" href="https://favicone.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body>
    <!-- 壁纸容器:外层 div 负责 transform/scale 过渡,内层 canvas 由 Pixi 渲染 -->
    <div class="wallpaper-wrapper" id="wallpaperWrapper"><canvas id="wallpaperGL"></canvas></div>
    <!-- 全局控制栏 -->
    <div class="global-controls">
        <div class="theme-toggle-btn" id="themeToggleBtn">
            <i class="fas fa-palette"></i>
        </div>
        <div class="theme-switcher" id="themeSwitcher">
            <div class="theme-btn light active" data-theme="light" title="亮色主题"></div>
            <div class="theme-btn dark" data-theme="dark" title="暗色主题"></div>
            <div class="theme-btn red" data-theme="red" title="姨妈红主题"></div>
            <div class="theme-btn purple" data-theme="purple" title="科技紫主题"></div>
            <div class="theme-btn gold" data-theme="gold" title="尊贵金主题"></div>
        </div>
    </div>
    
    <!-- 设置按钮 -->
    <div class="settings-btn" id="settingsBtn">
        <i class="fas fa-cog"></i>
    </div>
    
    <div class="container">
        <div class="search-container">
            <div class="search-box">
                <div class="engine-selector" id="engineSelector">
                    <div class="engine-icon google-icon"></div>
                    <div class="mode-indicator" id="modeIndicator">
                        <i class="fas fa-search"></i>
                    </div>
                </div>
                
                <textarea class="search-input" id="searchQuery" autocomplete="off" rows="2"></textarea>
                
                <div class="search-buttons">
                        <button class="search-btn" id="searchBtn">
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
            </div>
            
            <div class="engine-dropdown" id="engineDropdown">
                <!-- 引擎下拉菜单项将通过JavaScript动态生成 -->
            </div>
            
            <!-- 搜索建议列表 -->
            <div class="suggestions-container" id="suggestionsContainer">
                <!-- 搜索建议项将通过JavaScript动态生成 -->
            </div>
        </div>
        
        <!-- 快速链接区域 -->
        <div class="quick-links">
            <div class="quick-links-grid custom-scrollbar" id="quickLinksContainer">
                <!-- 快速链接将在这里动态显示 -->
            </div>
        </div>
    </div>

    <!-- 设置模态框 -->
    <div class="settings-modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>设置</h2>
                <button class="close-btn" id="closeSettingsBtn">×</button>
            </div>
            
            <!-- 标签页导航 -->
            <div class="tab-nav">
                <button class="tab-btn active" data-tab="bookmarks" id="bookmarksTabBtn">书签</button>
                <button class="tab-btn" data-tab="resource" id="resourceTabBtn">资源</button>
                <button class="tab-btn" data-tab="wallpaper" id="wallpaperTabBtn">壁纸</button>
                <button class="tab-btn" data-tab="data" id="dataTabBtn">数据</button>
            </div>
            
            <!-- 书签标签页 -->
            <div class="tab-content custom-scrollbar active" id="bookmarks-tab">
                <div class="add-link-form">
                    <input type="text" class="add-link-input" id="linkName" placeholder="输入网站名称">
                    <input type="text" class="add-link-input" id="linkUrl" placeholder="输入网站地址">
                    <input type="text" class="add-link-input" id="linkImageUrl" placeholder="输入图标URL（可选）">
                    <button class="primary-btn" id="addLinkBtn">添加书签</button>
                </div>
                
                <div class="links-list" id="linksContainer">
                    <!-- 书签将在这里动态显示 -->
                </div>
            </div>
            
            <!-- 资源标签页 -->
            <div class="tab-content custom-scrollbar" id="resource-tab">
                <!-- 添加引擎表单 - 置顶 -->
                <div class="add-engine-form">
                    <div class="add-engine-header">
                        <i class="fas fa-plus-circle"></i>
                        <span>添加引擎</span>
                    </div>
                    <div class="add-engine-fields">
                        <input type="text" class="add-link-input" id="resourceName" placeholder="引擎名称">
                        <input type="text" class="add-link-input" id="resourceUrl" placeholder="搜索地址（%s 代表搜索词）">
                        <input type="text" class="add-link-input" id="resourceImageUrl" placeholder="图标URL（可选）">
                        <select class="add-engine-category" id="resourceCategory">
                            <option value="search">搜索引擎</option>
                            <option value="translate">翻译引擎</option>
                            <option value="resource" selected>资源引擎</option>
                        </select>
                    </div>
                    <button class="primary-btn" id="addResourceBtn">添加引擎</button>
                </div>

                <div class="resource-divider"></div>

                <!-- 内置引擎区域 -->
                <div class="built-in-engines">
                    <div class="engine-section">
                        <div class="engine-section-header" id="searchEngineHeader">
                            <span class="engine-section-title"><i class="fas fa-search"></i> 搜索引擎</span>
                            <span class="engine-section-default" id="searchEngineDefault">Google</span>
                            <i class="fas fa-chevron-down engine-section-arrow"></i>
                        </div>
                        <div class="engine-section-content" id="searchEngineList">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                    <div class="engine-section">
                        <div class="engine-section-header" id="translateEngineHeader">
                            <span class="engine-section-title"><i class="fas fa-language"></i> 翻译引擎</span>
                            <span class="engine-section-default" id="translateEngineDefault">Google翻译</span>
                            <i class="fas fa-chevron-down engine-section-arrow"></i>
                        </div>
                        <div class="engine-section-content" id="translateEngineList">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                    <div class="engine-section">
                        <div class="engine-section-header" id="resourceEngineHeader">
                            <span class="engine-section-title"><i class="fas fa-compass"></i> 资源引擎</span>
                            <span class="engine-section-default" id="resourceEngineDefault">哔哩哔哩</span>
                            <i class="fas fa-chevron-down engine-section-arrow"></i>
                        </div>
                        <div class="engine-section-content" id="resourceEngineList">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                </div>
                
                <div class="links-list" id="resourcesContainer">
                    <!-- 自定义资源将在这里动态显示 -->
                </div>
            </div>
            
            <!-- 壁纸标签页 -->
            <div class="tab-content custom-scrollbar" id="wallpaper-tab">
                <div class="wallpaper-section">
                    <h3>背景设置</h3>
                    <div class="wallpaper-options">
                        <div class="wallpaper-option" id="defaultWallpaperOption">
                            <div class="wallpaper-preview default-bg"></div>
                            <span>默认</span>
                        </div>
                        <div class="wallpaper-option" id="gradient1WallpaperOption">
                            <div class="wallpaper-preview gradient1-bg"></div>
                            <span>渐变1</span>
                        </div>
                        <div class="wallpaper-option" id="gradient2WallpaperOption">
                            <div class="wallpaper-preview gradient2-bg"></div>
                            <span>渐变2</span>
                        </div>
                        <div class="wallpaper-option" id="gradient3WallpaperOption">
                            <div class="wallpaper-preview gradient3-bg"></div>
                            <span>渐变3</span>
                        </div>
                        <div class="wallpaper-option" id="gradient4WallpaperOption">
                            <div class="wallpaper-preview gradient4-bg"></div>
                            <span>渐变4</span>
                        </div>
                        <div class="wallpaper-option" id="gradient5WallpaperOption">
                            <div class="wallpaper-preview gradient5-bg"></div>
                            <span>渐变5</span>
                        </div>
                    </div>
                    
                    <div class="custom-wallpaper">
                        <h4>自定义颜色混色</h4>
                        <div class="color-mixer">
                            <div class="color-controls-vertical">
                                <div class="color-input-group">
                                    <input type="color" class="color-input" id="color1" value="#667eea">
                                    <span class="color-label">颜色1</span>
                                </div>
                                
                                <div class="color-input-group">
                                    <input type="color" class="color-input" id="color2" value="#764ba2">
                                    <span class="color-label">颜色2</span>
                                </div>
                                
                                <div class="gradient-direction">
                                    <div class="direction-grid">
                                        <button class="direction-btn" data-direction="315deg">↖</button>
                                        <button class="direction-btn" data-direction="270deg">↑</button>
                                        <button class="direction-btn" data-direction="225deg">↗</button>
                                        <button class="direction-btn" data-direction="0deg">←</button>
                                        <div class="direction-center"></div>
                                        <button class="direction-btn" data-direction="180deg">→</button>
                                        <button class="direction-btn" data-direction="45deg">↙</button>
                                        <button class="direction-btn" data-direction="90deg">↓</button>
                                        <button class="direction-btn active" data-direction="135deg">↘</button>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="gradient-action-container">
                                <div class="gradient-preview" id="gradientPreview"></div>
                                <div class="action-buttons">
                                    <button class="icon-action-btn random-btn" id="randomColorsBtn" title="随机混色">
                                        <i class="fas fa-random"></i>
                                    </button>
                                    <button class="icon-action-btn apply-btn" id="applyCustomGradientBtn" title="应用背景">
                                        <i class="fas fa-check"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                        <h4 style="margin-top: 24px;">图片壁纸</h4>
                        <div class="custom-wallpaper-controls">
                            <div class="wallpaper-input-group">
                                <input type="text" class="wallpaper-url-input" id="customWallpaperUrl" placeholder="输入图片URL">
                                <div class="wallpaper-buttons">
                                    <button class="icon-btn" id="setCustomWallpaperBtn" title="应用壁纸">
                                        <i class="fas fa-check"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                        <h4 style="margin-top: 24px;">SVG壁纸</h4>
                        <div class="custom-wallpaper-controls">
                            <div class="svg-input-group">
                                <textarea class="svg-code-input custom-scrollbar" id="svgCode" placeholder="输入SVG代码（实时生效，空白表示不使用SVG壁纸）..." rows="8"></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 数据标签页 -->
            <div class="tab-content custom-scrollbar" id="data-tab">
                <div class="data-section">
                    <textarea class="data-preview custom-scrollbar" id="dataPreview" placeholder="JSON数据将在这里显示，您可以编辑后保存..." rows="15"></textarea>
                    <div class="data-actions">
                        <button class="primary-btn" id="saveDataConfigBtn">保存配置</button>
                    </div>
                    <div class="data-url-import">
                        <input type="text" class="data-url-input" id="dataUrlInput" placeholder="输入JSON数据URL">
                        <button class="primary-btn" id="applyDataFromURLBtn"><i class="fas fa-check"></i></button>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <!-- 独立对话框层级 - 移出 modal-content 避免毛玻璃套叠 -->
    <!-- 删除书签确认对话框 -->
    <div class="confirm-dialog" id="confirmDialog">
        <div class="confirm-content">
            <div class="confirm-header">
                <h3>确认删除</h3>
            </div>
            <div class="confirm-body">
                <p>确定要删除这个书签吗？</p>
            </div>
            <div class="confirm-footer">
                <button class="confirm-btn cancel" id="closeConfirmDialogBtn">取消</button>
                <button class="confirm-btn confirm" id="confirmDeleteLinkBtn">确定</button>
            </div>
        </div>
    </div>

    <!-- 编辑书签对话框 -->
    <div class="confirm-dialog" id="editDialog">
        <div class="confirm-content">
            <div class="confirm-header">
                <h3>编辑书签</h3>
            </div>
            <div class="confirm-body">
                <div class="edit-form">
                    <div class="form-group">
                        <label for="editLinkName">名称</label>
                        <input type="text" id="editLinkName" class="edit-input">
                    </div>
                    <div class="form-group">
                        <label for="editLinkUrl">地址</label>
                        <input type="text" id="editLinkUrl" class="edit-input">
                    </div>
                    <div class="form-group">
                        <label for="editLinkImageUrl">图标URL</label>
                        <input type="text" id="editLinkImageUrl" class="edit-input">
                    </div>
                </div>
            </div>
            <div class="confirm-footer">
                <button class="confirm-btn cancel" id="closeEditDialogBtn">取消</button>
                <button class="confirm-btn confirm" id="saveEditedLinkBtn">确定</button>
            </div>
        </div>
    </div>

    <!-- 编辑资源对话框 -->
    <div class="confirm-dialog" id="editResourceDialog">
        <div class="confirm-content">
            <div class="confirm-header">
                <h3>编辑资源</h3>
            </div>
            <div class="confirm-body">
                <div class="edit-form">
                    <div class="form-group">
                        <label for="editResourceName">名称</label>
                        <input type="text" id="editResourceName" class="edit-input">
                    </div>
                    <div class="form-group">
                        <label for="editResourceUrl">地址</label>
                        <input type="text" id="editResourceUrl" class="edit-input">
                    </div>
                    <div class="form-group">
                        <label for="editResourceImageUrl">图标URL</label>
                        <input type="text" id="editResourceImageUrl" class="edit-input">
                    </div>
                </div>
            </div>
            <div class="confirm-footer">
                <button class="confirm-btn cancel" id="closeEditResourceDialogBtn">取消</button>
                <button class="confirm-btn confirm" id="saveEditedResourceBtn">确定</button>
            </div>
        </div>
    </div>

    <!-- 删除资源确认对话框 -->
    <div class="confirm-dialog" id="confirmResourceDialog">
        <div class="confirm-content">
            <div class="confirm-header">
                <h3>确认删除</h3>
            </div>
            <div class="confirm-body">
                <p>确定要删除这个资源吗？</p>
            </div>
            <div class="confirm-footer">
                <button class="confirm-btn cancel" id="closeConfirmResourceDialogBtn">取消</button>
                <button class="confirm-btn confirm" id="confirmDeleteResourceBtn">确定</button>
            </div>
        </div>
    </div>

    <!-- 编辑引擎图标弹窗 -->
    <div class="confirm-dialog" id="editFaviconDialog">
        <div class="confirm-content">
            <div class="confirm-header">
                <h3>编辑图标</h3>
            </div>
            <div class="confirm-body">
                <div class="edit-form">
                    <div class="form-group">
                        <label for="editFaviconUrl">图标URL（留空恢复默认）</label>
                        <input type="text" id="editFaviconUrl" class="edit-input" placeholder="https://example.com/icon.png">
                    </div>
                </div>
            </div>
            <div class="confirm-footer">
                <button class="confirm-btn cancel" id="closeEditFaviconBtn">取消</button>
                <button class="confirm-btn confirm" id="saveEditFaviconBtn" style="background: rgba(var(--primary-color-rgb), 0.85); border-color: rgba(var(--primary-color-rgb), 0.3);">确定</button>
            </div>
        </div>
    </div>

    <!-- 确认删除引擎弹窗 -->
    <div class="confirm-dialog" id="confirmDeleteEngineDialog">
        <div class="confirm-content">
            <div class="confirm-header">
                <h3>确认删除</h3>
            </div>
            <div class="confirm-body">
                <p>确定要删除此引擎吗？</p>
            </div>
            <div class="confirm-footer">
                <button class="confirm-btn cancel" id="closeDeleteEngineBtn">取消</button>
                <button class="confirm-btn confirm" id="confirmDeleteEngineBtn">确定</button>
            </div>
        </div>
    </div>

    <!-- Toast 通知容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
