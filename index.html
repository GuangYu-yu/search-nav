<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索导航</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg width='24' height='24' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg' aria-hidden='true'><circle cx='11' cy='11' r='6' stroke='currentColor' stroke-width='2' stroke-linecap='round'/><path d='M15.5 15.5L20.5 20.5' stroke='currentColor' stroke-width='2' stroke-linecap='round'/></svg>" type="image/svg+xml">
</head>
<body>
    <!-- 全局控制栏 -->
    <div class="global-controls">
        <div class="theme-toggle-btn" onclick="toggleThemeSwitcher()">
            <i class="fas fa-palette"></i>
        </div>
        <div class="theme-switcher" id="themeSwitcher">
            <div class="theme-btn light active" onclick="setTheme('light')" title="亮色主题"></div>
            <div class="theme-btn dark" onclick="setTheme('dark')" title="暗色主题"></div>
            <div class="theme-btn red" onclick="setTheme('red')" title="姨妈红主题"></div>
            <div class="theme-btn purple" onclick="setTheme('purple')" title="科技紫主题"></div>
            <div class="theme-btn gold" onclick="setTheme('gold')" title="尊贵金主题"></div>
        </div>
    </div>
    
    <!-- 设置按钮 -->
    <div class="settings-btn" onclick="openSettings()">
        <i class="fas fa-cog"></i>
    </div>
    
    <div class="container">
        
        <!-- 时间显示 -->
        <div class="time-display" id="timeDisplay"></div>
        
        <div class="mode-switcher">
            <div class="mode-switcher-container">
                <button class="mode-btn active" data-mode="search">🔍 搜索</button>
                <button class="mode-btn" data-mode="translate">🌐 翻译</button>
                <div class="mode-slider"></div>
            </div>
        </div>
        
        <div class="search-container">
            <div class="search-box">
                <div class="engine-selector" onclick="toggleEngineDropdown()">
                    <div class="engine-icon google-icon"></div>
                </div>
                
                <input type="text" class="search-input" id="searchQuery" placeholder="输入搜索内容或网址...">
                
                <div class="search-buttons">
                        <button class="search-btn" onclick="handleSearch()">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
            </div>
            
            <div class="engine-dropdown" id="engineDropdown">
                <!-- 引擎下拉菜单项将通过JavaScript动态生成 -->
            </div>
        </div>
        
        <!-- 快速链接区域 -->
        <div class="quick-links">
            <div class="quick-links-grid" id="quickLinksContainer">
                <!-- 快速链接将在这里动态显示 -->
            </div>
        </div>
    </div>

    <!-- 设置模态框 -->
    <div class="settings-modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>设置</h2>
                <button class="close-btn" onclick="closeSettings()">×</button>
            </div>
            
            <!-- 标签页导航 -->
            <div class="tab-nav">
                <button class="tab-btn active" data-tab="bookmarks">📚 书签</button>
                <button class="tab-btn" data-tab="wallpaper">🖼️ 壁纸</button>
                <div class="tab-slider"></div>
            </div>
            
            <!-- 书签标签页 -->
            <div class="tab-content active" id="bookmarks-tab">
                <div class="add-link-form">
                    <input type="text" class="add-link-input" id="linkName" placeholder="网站名称">
                    <input type="text" class="add-link-input" id="linkUrl" placeholder="网站地址">
                    <button class="add-btn" onclick="addLink()">添加书签</button>
                </div>
                
                <div class="links-list" id="linksContainer">
                    <!-- 书签将在这里动态显示 -->
                </div>
            </div>
            
            <!-- 壁纸标签页 -->
            <div class="tab-content" id="wallpaper-tab">
                <div class="wallpaper-section">
                    <h3>背景设置</h3>
                    <div class="wallpaper-options">
                        <div class="wallpaper-option" onclick="setWallpaper('default')">
                            <div class="wallpaper-preview default-bg"></div>
                            <span>默认</span>
                        </div>
                        <div class="wallpaper-option" onclick="setWallpaper('gradient1')">
                            <div class="wallpaper-preview gradient1-bg"></div>
                            <span>渐变1</span>
                        </div>
                        <div class="wallpaper-option" onclick="setWallpaper('gradient2')">
                            <div class="wallpaper-preview gradient2-bg"></div>
                            <span>渐变2</span>
                        </div>
                        <div class="wallpaper-option" onclick="setWallpaper('gradient3')">
                            <div class="wallpaper-preview gradient3-bg"></div>
                            <span>渐变3</span>
                        </div>
                        <div class="wallpaper-option" onclick="setWallpaper('gradient4')">
                            <div class="wallpaper-preview gradient4-bg"></div>
                            <span>渐变4</span>
                        </div>
                        <div class="wallpaper-option" onclick="setWallpaper('gradient5')">
                            <div class="wallpaper-preview gradient5-bg"></div>
                            <span>渐变5</span>
                        </div>
                    </div>
                    
                    <div class="custom-wallpaper">
                        <h4>自定义颜色混色</h4>
                        <div class="color-mixer">
                            <div class="color-controls-vertical">
                                <div class="color-input-group">
                                    <input type="color" class="color-input" id="color1" value="#667eea">
                                    <span class="color-label">颜色1</span>
                                </div>
                                
                                <div class="color-input-group">
                                    <input type="color" class="color-input" id="color2" value="#764ba2">
                                    <span class="color-label">颜色2</span>
                                </div>
                                
                                <div class="gradient-direction">
                                    <div class="direction-grid">
                                        <button class="direction-btn" data-direction="315deg">↖</button>
                                        <button class="direction-btn" data-direction="270deg">↑</button>
                                        <button class="direction-btn" data-direction="225deg">↗</button>
                                        <button class="direction-btn" data-direction="0deg">←</button>
                                        <div class="direction-center"></div>
                                        <button class="direction-btn" data-direction="180deg">→</button>
                                        <button class="direction-btn" data-direction="45deg">↙</button>
                                        <button class="direction-btn" data-direction="90deg">↓</button>
                                        <button class="direction-btn active" data-direction="135deg">↘</button>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="gradient-action-container">
                                <div class="gradient-preview" id="gradientPreview"></div>
                                <div class="action-buttons">
                                    <button class="icon-action-btn random-btn" onclick="randomColors()" title="随机混色">
                                        <i class="fas fa-random"></i>
                                    </button>
                                    <button class="icon-action-btn apply-btn" onclick="applyCustomGradient()" title="应用背景">
                                        <i class="fas fa-check"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                        <h4 style="margin-top: 24px;">图片壁纸</h4>
                        <div class="custom-wallpaper-controls">
                            <div class="wallpaper-input-group">
                                <input type="text" class="wallpaper-url-input" id="customWallpaperUrl" placeholder="输入图片URL">
                                <div class="wallpaper-buttons">
                                    <button class="icon-btn" onclick="setCustomWallpaper()" title="应用壁纸">
                                        <i class="fas fa-check"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
